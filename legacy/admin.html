<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Scoped admin styles */
        body { padding-top: 100px; }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 80vh;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
        }
        .admin-table th, .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .admin-table th {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            font-weight: 600;
        }
        .admin-table tr:last-child td { border-bottom: none; }
        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }
        #loading-msg {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }
    </style>
</head>

<body>
    <nav id="navbar" class="scrolled">
        <div class="logo">LUXE ADMIN</div>
        <div class="nav-links">
            <a href="index.html">Back to Site</a>
        </div>
    </nav>

    <div class="admin-container section">
        <div class="admin-header">
            <h2 class="section-title" style="text-align: left; margin: 0;">Bookings Dashboard</h2>
        </div>
        
        <div id="loading-msg">Loading appointments from database...</div>

        <table class="admin-table" id="appointments-table" style="display: none;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Name</th>
                    <th>Service</th>
                    <th>Phone</th>
                    <th>Booked On</th>
                </tr>
            </thead>
            <tbody id="appointments-body">
                <!-- Appointments will be injected here -->
            </tbody>
        </table>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="admin.js"></script>
</body>

</html>
